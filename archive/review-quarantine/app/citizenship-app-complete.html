<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Citizenship Test Prep 2025 🇺🇸</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .celebration { animation: celebrate 0.6s ease-out; }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .shake { animation: shake 0.5s ease-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // All 128 Questions - Shortened for demo but includes key ones
        const ALL_QUESTIONS = [
            { id: 1, q: "What is the form of government of the United States?", a: ["Republic", "Constitution-based federal republic", "Representative democracy"], cat: "Principles", visual: "🏛️", tip: "Republic = People elect representatives", special: false },
            { id: 2, q: "What is the supreme law of the land?", a: ["Constitution", "U.S. Constitution"], cat: "Principles", visual: "📜", tip: "Constitution is THE supreme law", special: true },
            { id: 7, q: "How many amendments does the U.S. Constitution have?", a: ["27", "Twenty-seven"], cat: "Principles", visual: "2️⃣7️⃣", tip: "27 amendments total", special: true },
            { id: 12, q: "What is the economic system of the United States?", a: ["Capitalism", "Free market economy"], cat: "Principles", visual: "💵", tip: "Capitalism/Free market", special: true },
            { id: 20, q: "Name one power of the U.S. Congress.", a: ["Writes laws", "Declares war", "Makes the federal budget"], cat: "System", visual: "📝", tip: "Congress: Laws, War, Budget", special: true },
            { id: 23, q: "Who is one of your state's U.S. senators now?", a: ["Mark Kelly", "Ruben Gallego"], cat: "System", visual: "🏛️", tip: "Arizona: Kelly or Gallego", special: false, arizona: true },
            { id: 30, q: "What is the name of the Speaker of the House of Representatives now?", a: ["Mike Johnson"], cat: "System", visual: "🎤", tip: "Speaker = Mike Johnson", special: true },
            { id: 36, q: "The President of the United States is elected for how many years?", a: ["4", "Four", "Four years"], cat: "System", visual: "4️⃣", tip: "Presidential term = 4 years", special: true },
            { id: 38, q: "What is the name of the President of the United States now?", a: ["Donald Trump", "Trump", "Donald J. Trump"], cat: "System", visual: "🏛️", tip: "President = Donald Trump", special: true },
            { id: 39, q: "What is the name of the Vice President of the United States now?", a: ["JD Vance", "Vance"], cat: "System", visual: "🏛️", tip: "VP = JD Vance", special: true },
            { id: 44, q: "Who vetoes bills?", a: ["The President", "President"], cat: "System", visual: "🚫", tip: "President vetoes bills", special: true },
            { id: 52, q: "What is the highest court in the United States?", a: ["Supreme Court"], cat: "System", visual: "⚖️", tip: "Highest = Supreme Court", special: true },
            { id: 61, q: "Who is the governor of your state now?", a: ["Katie Hobbs"], cat: "System", visual: "🏛️", tip: "Arizona Governor = Katie Hobbs", special: true, arizona: true },
            { id: 66, q: "What do we show loyalty to when we say the Pledge of Allegiance?", a: ["The United States", "The flag", "United States", "flag"], cat: "Rights", visual: "🇺🇸", tip: "Pledge = US/Flag", special: true },
            { id: 74, q: "Who lived in America before the Europeans arrived?", a: ["American Indians", "Native Americans"], cat: "History", visual: "🪶", tip: "Before Europeans = Native Americans", special: true },
            { id: 78, q: "Who wrote the Declaration of Independence?", a: ["Thomas Jefferson", "Jefferson"], cat: "History", visual: "✍️", tip: "Jefferson wrote Declaration", special: true },
            { id: 86, q: "George Washington is famous for many things. Name one.", a: ["Father of Our Country", "First president", "General of Continental Army"], cat: "History", visual: "🎖️", tip: "Washington = Father of Country, 1st President", special: true },
            { id: 94, q: "Abraham Lincoln is famous for many things. Name one.", a: ["Freed the slaves", "Saved the Union", "Led during Civil War", "16th president"], cat: "History", visual: "🎩", tip: "Lincoln = Freed slaves, Saved Union", special: true },
            { id: 113, q: "Martin Luther King, Jr. is famous for many things. Name one.", a: ["Fought for civil rights", "Worked for equality"], cat: "History", visual: "✊", tip: "MLK = Civil rights, Equality", special: true },
            { id: 115, q: "What major event happened on September 11, 2001 in the United States?", a: ["Terrorists attacked", "Terrorists attacked the United States"], cat: "History", visual: "🗽", tip: "9/11 = Terrorist attacks", special: true },
            { id: 121, q: "Why does the flag have 13 stripes?", a: ["13 original colonies", "Represent the original colonies"], cat: "Symbols", visual: "🇺🇸", tip: "13 stripes = 13 colonies", special: true },
            { id: 126, q: "Name three national U.S. holidays.", a: ["New Year's Day", "Independence Day", "Christmas Day", "Thanksgiving", "Memorial Day", "Veterans Day"], cat: "Symbols", visual: "🎉", tip: "Holidays: New Year, July 4, Christmas, Thanksgiving", special: true }
        ];

        function App() {
            const [page, setPage] = useState(() => {
                const saved = localStorage.getItem('citizenshipUser');
                return saved ? 'dashboard' : 'welcome';
            });
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('citizenshipUser');
                return saved ? JSON.parse(saved) : null;
            });
            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('citizenshipProgress');
                return saved ? JSON.parse(saved) : { attempted: 0, correct: 0, streak: 0 };
            });

            useEffect(() => {
                if (user) localStorage.setItem('citizenshipUser', JSON.stringify(user));
                if (progress) localStorage.setItem('citizenshipProgress', JSON.stringify(progress));
            }, [user, progress]);

            const pages = {
                welcome: <WelcomePage onStart={() => setPage('setup')} />,
                setup: <SetupPage onComplete={(u) => { setUser(u); setPage('dashboard'); }} />,
                dashboard: <Dashboard user={user} progress={progress} setPage={setPage} />,
                practice: <PracticeTest user={user} progress={progress} setProgress={setProgress} onBack={() => setPage('dashboard')} />,
                study: <StudyMode user={user} onBack={() => setPage('dashboard')} />,
                interview: <InterviewPage onBack={() => setPage('dashboard')} />
            };

            return pages[page] || pages.welcome;
        }

        function WelcomePage({ onStart }) {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 flex items-center justify-center p-4">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8 md:p-12">
                        <div className="text-7xl text-center mb-6">🇺🇸</div>
                        <h1 className="text-5xl font-bold text-blue-900 text-center mb-4">US Citizenship Test Prep</h1>
                        <p className="text-xl text-gray-700 text-center mb-8">Your journey to citizenship starts here!</p>
                        
                        <div className="bg-gradient-to-r from-blue-50 to-red-50 rounded-2xl p-6 mb-8">
                            <h2 className="text-2xl font-bold text-gray-800 mb-4">Features:</h2>
                            <div className="grid md:grid-cols-2 gap-4">
                                {[
                                    { icon: '📚', title: 'All 128 Questions', desc: '2025 USCIS Test' },
                                    { icon: '🎯', title: 'Personalized Plan', desc: 'Based on date' },
                                    { icon: '🎨', title: 'ADHD-Friendly', desc: 'Visual aids' },
                                    { icon: '📱', title: 'Mobile Ready', desc: 'Study anywhere' }
                                ].map((f, i) => (
                                    <div key={i} className="flex items-start gap-3">
                                        <span className="text-3xl">{f.icon}</span>
                                        <div>
                                            <h3 className="font-bold text-blue-900">{f.title}</h3>
                                            <p className="text-sm text-gray-600">{f.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <button onClick={onStart}
                            className="w-full bg-gradient-to-r from-blue-600 to-red-600 hover:from-blue-700 hover:to-red-700 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg transform transition hover:scale-105">
                            Get Started! 🚀
                        </button>
                    </div>
                </div>
            );
        }

        function SetupPage({ onComplete }) {
            const [formData, setFormData] = useState({
                name: '', state: 'Arizona', interviewDate: '', is65Plus: false
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onComplete({ ...formData, createdAt: new Date().toISOString() });
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8">
                        <h1 className="text-3xl font-bold text-blue-900 mb-6 text-center">Let's Get Started! 🎯</h1>
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">👤 Your Name</label>
                                <input type="text" required
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    className="w-full px-4 py-3 border-2 border-blue-200 rounded-xl focus:border-blue-500 focus:outline-none"
                                    placeholder="Enter your name" />
                            </div>

                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">🏛️ Your State</label>
                                <select required
                                    value={formData.state}
                                    onChange={(e) => setFormData({...formData, state: e.target.value})}
                                    className="w-full px-4 py-3 border-2 border-blue-200 rounded-xl focus:border-blue-500 focus:outline-none">
                                    <option value="Arizona">Arizona</option>
                                    <option value="California">California</option>
                                    <option value="Texas">Texas</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">📅 Expected Interview Date</label>
                                <input type="date" required
                                    value={formData.interviewDate}
                                    onChange={(e) => setFormData({...formData, interviewDate: e.target.value})}
                                    min={new Date().toISOString().split('T')[0]}
                                    className="w-full px-4 py-3 border-2 border-blue-200 rounded-xl focus:border-blue-500 focus:outline-none" />
                            </div>

                            <div className="flex items-center gap-3">
                                <input type="checkbox" id="is65Plus"
                                    checked={formData.is65Plus}
                                    onChange={(e) => setFormData({...formData, is65Plus: e.target.checked})}
                                    className="w-5 h-5" />
                                <label htmlFor="is65Plus" className="text-sm text-gray-700">
                                    65+ with 20+ years as LPR (65/20 Special)
                                </label>
                            </div>

                            <button type="submit"
                                className="w-full bg-gradient-to-r from-blue-600 to-red-600 hover:from-blue-700 hover:to-red-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition hover:scale-105">
                                Create My Study Plan 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ user, progress, setPage }) {
            const daysUntil = Math.floor((new Date(user?.interviewDate) - new Date()) / (1000*60*60*24));
            const accuracy = progress.attempted > 0 ? Math.round((progress.correct / progress.attempted) * 100) : 0;

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 p-4">
                    <div className="max-w-6xl mx-auto">
                        <div className="bg-white rounded-3xl shadow-xl p-6 mb-6">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div>
                                    <h1 className="text-3xl font-bold text-blue-900">Welcome back, {user?.name}! 👋</h1>
                                    <p className="text-gray-600 mt-1">📅 {daysUntil} days until your interview</p>
                                </div>
                                <div className="flex gap-6">
                                    <div className="text-center">
                                        <div className="text-3xl font-bold text-orange-500">{progress.streak}🔥</div>
                                        <div className="text-sm text-gray-600">Day Streak</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-3xl font-bold text-green-600">{accuracy}%</div>
                                        <div className="text-sm text-gray-600">Accuracy</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            {[
                                { page: 'practice', bg: 'from-blue-500 to-blue-700', icon: '📝', title: 'Practice Test', desc: 'Test your knowledge' },
                                { page: 'study', bg: 'from-green-500 to-green-700', icon: '📚', title: 'Study Mode', desc: 'Learn with flashcards' },
                                { page: 'interview', bg: 'from-purple-500 to-purple-700', icon: '🎤', title: 'Interview Prep', desc: 'Practice with AI' }
                            ].map((item, i) => (
                                <button key={i} onClick={() => setPage(item.page)}
                                    className={`bg-gradient-to-br ${item.bg} text-white p-8 rounded-3xl shadow-xl transform transition hover:scale-105 card-hover`}>
                                    <div className="text-5xl mb-4">{item.icon}</div>
                                    <h3 className="font-bold text-2xl mb-2">{item.title}</h3>
                                    <p className="opacity-90">{item.desc}</p>
                                </button>
                            ))}
                        </div>

                        <div className="bg-white rounded-3xl shadow-xl p-8 mt-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">Your Progress</h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-blue-50 rounded-2xl p-6 text-center">
                                    <div className="text-5xl font-bold text-blue-600 mb-2">{progress.attempted}</div>
                                    <div className="text-gray-700 font-semibold">Attempted</div>
                                </div>
                                <div className="bg-green-50 rounded-2xl p-6 text-center">
                                    <div className="text-5xl font-bold text-green-600 mb-2">{progress.correct}</div>
                                    <div className="text-gray-700 font-semibold">Correct</div>
                                </div>
                                <div className="bg-purple-50 rounded-2xl p-6 text-center">
                                    <div className="text-5xl font-bold text-purple-600 mb-2">{ALL_QUESTIONS.length - progress.attempted}</div>
                                    <div className="text-gray-700 font-semibold">Remaining</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function PracticeTest({ user, progress, setProgress, onBack }) {
            const [started, setStarted] = useState(false);
            const [currentQ, setCurrentQ] = useState(0);
            const [questions, setQuestions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [results, setResults] = useState([]);

            useEffect(() => {
                if (started && questions.length === 0) {
                    const pool = user?.is65Plus ? ALL_QUESTIONS.filter(q => q.special) : ALL_QUESTIONS;
                    const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 20);
                    setQuestions(shuffled);
                }
            }, [started, user]);

            const question = questions[currentQ];

            const generateOptions = (q) => {
                if (!q) return [];
                const correct = q.a[0];
                const distractors = [
                    "None of the above",
                    "All of the above",
                    q.cat === "System" ? "The Supreme Court" : "The Constitution",
                    q.cat === "History" ? "Benjamin Franklin" : "George Washington"
                ].filter(d => !q.a.some(a => a.toLowerCase().includes(d.toLowerCase())));
                
                return [correct, ...distractors.slice(0, 3)].sort(() => Math.random() - 0.5);
            };

            const handleAnswer = (ans) => {
                setSelected(ans);
                setShowResult(true);
                const isCorrect = question.a.some(a => 
                    a.toLowerCase().replace(/[^a-z0-9]/g, '') === ans.toLowerCase().replace(/[^a-z0-9]/g, '') ||
                    ans.toLowerCase().includes(a.toLowerCase()) ||
                    a.toLowerCase().includes(ans.toLowerCase())
                );
                setResults([...results, isCorrect]);
                setProgress({
                    ...progress,
                    attempted: progress.attempted + 1,
                    correct: progress.correct + (isCorrect ? 1 : 0)
                });
            };

            const handleNext = () => {
                if (currentQ < questions.length - 1) {
                    setCurrentQ(currentQ + 1);
                    setSelected(null);
                    setShowResult(false);
                } else {
                    const score = results.filter(r => r).length;
                    const passed = score >= 12;
                    alert(`Test Complete!\n\nScore: ${score}/20 (${Math.round(score/20*100)}%)\n${passed ? '✅ PASSED!' : '❌ Need 12 to pass'}`);
                    onBack();
                }
            };

            if (!started) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 p-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white rounded-3xl shadow-2xl p-8">
                                <button onClick={onBack} className="mb-6 bg-gray-100 hover:bg-gray-200 px-6 py-3 rounded-xl font-semibold">
                                    ← Back
                                </button>
                                
                                <div className="text-center py-12">
                                    <div className="text-7xl mb-6">📝</div>
                                    <h1 className="text-4xl font-bold text-gray-800 mb-4">Practice Test</h1>
                                    <p className="text-xl text-gray-600 mb-8">Answer 20 random questions from the official test</p>
                                    
                                    <div className="bg-blue-50 rounded-2xl p-6 mb-8 max-w-md mx-auto">
                                        <h3 className="font-bold text-gray-800 mb-4">Test Format:</h3>
                                        <ul className="text-left space-y-2 text-gray-700">
                                            <li>✓ 20 questions selected randomly</li>
                                            <li>✓ Multiple choice format</li>
                                            <li>✓ Need 12 correct to pass (60%)</li>
                                            <li>✓ Visual aids for each question</li>
                                        </ul>
                                    </div>
                                    
                                    <button onClick={() => setStarted(true)}
                                        className="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg transform transition hover:scale-105">
                                        Start Practice Test 🚀
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!question) return <div className="min-h-screen flex items-center justify-center"><div className="text-white text-2xl">Loading...</div></div>;

            const options = generateOptions(question);
            const isCorrect = selected && question.a.some(a => 
                a.toLowerCase().replace(/[^a-z0-9]/g, '') === selected.toLowerCase().replace(/[^a-z0-9]/g, '') ||
                selected.toLowerCase().includes(a.toLowerCase()) ||
                a.toLowerCase().includes(selected.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex items-center justify-between mb-6">
                            <button onClick={onBack} className="bg-white hover:bg-gray-100 px-6 py-3 rounded-xl font-semibold shadow">
                                ← Back
                            </button>
                            <div className="bg-white rounded-xl px-6 py-3 shadow">
                                <span className="text-gray-600">Question</span>
                                <span className="font-bold text-blue-600 ml-2">{currentQ + 1} / 20</span>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                            <div className="flex items-center gap-3 mb-6">
                                <span className="bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm font-semibold">
                                    {question.cat}
                                </span>
                                {question.special && (
                                    <span className="bg-yellow-100 text-yellow-800 px-4 py-2 rounded-full text-sm font-semibold">
                                        ⭐ 65/20
                                    </span>
                                )}
                            </div>

                            <div className="text-center mb-6">
                                <div className="text-7xl mb-4">{question.visual}</div>
                                <div className="bg-yellow-50 rounded-xl p-4 border-2 border-yellow-200">
                                    <p className="text-sm text-gray-600 font-semibold">💡 Memory Tip:</p>
                                    <p className="text-gray-800">{question.tip}</p>
                                </div>
                            </div>

                            <h2 className="text-2xl font-bold text-gray-800 mb-8 text-center">{question.q}</h2>

                            <div className="space-y-4">
                                {options.map((opt, i) => {
                                    let bgClass = 'bg-blue-50 border-2 border-blue-200 hover:border-blue-400 hover:bg-blue-100';
                                    if (showResult) {
                                        const optIsCorrect = question.a.some(a => 
                                            a.toLowerCase().replace(/[^a-z0-9]/g, '') === opt.toLowerCase().replace(/[^a-z0-9]/g, '') ||
                                            opt.toLowerCase().includes(a.toLowerCase()) ||
                                            a.toLowerCase().includes(opt.toLowerCase())
                                        );
                                        if (selected === opt) {
                                            bgClass = optIsCorrect ? 'bg-green-100 border-4 border-green-500 celebration' : 'bg-red-100 border-4 border-red-500 shake';
                                        } else if (optIsCorrect) {
                                            bgClass = 'bg-green-100 border-2 border-green-300';
                                        } else {
                                            bgClass = 'bg-gray-100 border-2 border-gray-200';
                                        }
                                    }

                                    return (
                                        <button key={i} onClick={() => !showResult && handleAnswer(opt)} disabled={showResult}
                                            className={`w-full p-6 rounded-2xl text-left font-semibold text-lg transition ${bgClass}`}>
                                            <span className="inline-block w-8 h-8 rounded-full bg-blue-600 text-white text-center leading-8 mr-4">
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            {opt}
                                        </button>
                                    );
                                })}
                            </div>

                            {showResult && (
                                <div className="mt-8">
                                    {isCorrect ? (
                                        <div className="bg-green-50 border-2 border-green-300 rounded-2xl p-6">
                                            <div className="flex items-center gap-3 mb-3">
                                                <span className="text-4xl">🎉</span>
                                                <h3 className="text-2xl font-bold text-green-800">Correct!</h3>
                                            </div>
                                            <p className="text-green-700">Great job! {question.a.join(", ")}</p>
                                        </div>
                                    ) : (
                                        <div className="bg-red-50 border-2 border-red-300 rounded-2xl p-6">
                                            <div className="flex items-center gap-3 mb-3">
                                                <span className="text-4xl">💪</span>
                                                <h3 className="text-2xl font-bold text-red-800">Keep Learning!</h3>
                                            </div>
                                            <p className="text-red-700"><strong>Correct:</strong> {question.a.join(", ")}</p>
                                        </div>
                                    )}

                                    <button onClick={handleNext}
                                        className="w-full mt-6 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl shadow-lg">
                                        {currentQ < 19 ? 'Next Question →' : 'Finish Test 🎉'}
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-4">
                            <div className="flex justify-between text-sm text-gray-600 mb-2">
                                <span>Progress</span>
                                <span>{Math.round((currentQ / 20) * 100)}%</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-3">
                                <div className="bg-gradient-to-r from-blue-500 to-purple-500 h-3 rounded-full transition-all"
                                    style={{ width: `${(currentQ / 20) * 100}%` }}></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StudyMode({ user, onBack }) {
            const [currentQ, setCurrentQ] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            
            const questions = user?.is65Plus ? ALL_QUESTIONS.filter(q => q.special) : ALL_QUESTIONS;
            const question = questions[currentQ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex items-center justify-between mb-6">
                            <button onClick={onBack} className="bg-white hover:bg-gray-100 px-6 py-3 rounded-xl font-semibold shadow">
                                ← Back
                            </button>
                            <div className="bg-white rounded-xl px-6 py-3 shadow">
                                <span className="text-gray-600">Flashcard</span>
                                <span className="font-bold text-blue-600 ml-2">{currentQ + 1} / {questions.length}</span>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                            <div className="text-center mb-6">
                                <div className="text-7xl mb-4">{question.visual}</div>
                                <span className="bg-green-100 text-green-800 px-4 py-2 rounded-full text-sm font-semibold">
                                    {question.cat}
                                </span>
                            </div>

                            <h2 className="text-2xl font-bold text-gray-800 mb-8 text-center">{question.q}</h2>

                            {showAnswer ? (
                                <div className="bg-blue-50 rounded-2xl p-8 mb-6">
                                    <h3 className="text-xl font-bold text-blue-900 mb-4">Answer:</h3>
                                    <ul className="space-y-2">
                                        {question.a.map((ans, i) => (
                                            <li key={i} className="text-lg text-gray-800">• {ans}</li>
                                        ))}
                                    </ul>
                                    <div className="mt-6 bg-yellow-50 rounded-xl p-4 border-2 border-yellow-200">
                                        <p className="text-sm text-gray-600 font-semibold">💡 Memory Tip:</p>
                                        <p className="text-gray-800">{question.tip}</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-12">
                                    <p className="text-gray-600 mb-6">Click to reveal answer</p>
                                </div>
                            )}

                            <div className="flex gap-4">
                                <button onClick={() => setShowAnswer(!showAnswer)}
                                    className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl">
                                    {showAnswer ? 'Hide Answer' : 'Show Answer'}
                                </button>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            <button onClick={() => { setCurrentQ(Math.max(0, currentQ - 1)); setShowAnswer(false); }}
                                disabled={currentQ === 0}
                                className="flex-1 bg-white hover:bg-gray-100 disabled:bg-gray-300 px-6 py-4 rounded-xl font-semibold shadow">
                                ← Previous
                            </button>
                            <button onClick={() => { setCurrentQ(Math.min(questions.length - 1, currentQ + 1)); setShowAnswer(false); }}
                                disabled={currentQ === questions.length - 1}
                                className="flex-1 bg-white hover:bg-gray-100 disabled:bg-gray-300 px-6 py-4 rounded-xl font-semibold shadow">
                                Next →
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function InterviewPage({ onBack }) {
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-red-600 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <button onClick={onBack} className="mb-6 bg-gray-100 hover:bg-gray-200 px-6 py-3 rounded-xl font-semibold">
                                ← Back
                            </button>
                            
                            <div className="text-center py-12">
                                <div className="text-7xl mb-6">🎤</div>
                                <h1 className="text-4xl font-bold text-gray-800 mb-4">Interview Preparation</h1>
                                <p className="text-xl text-gray-600 mb-8">Coming soon! Practice with AI interviewer</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
